services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gvip-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gvip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gvip_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gvip}
    ports:
      - "5433:5432"  # host 5433 — local PostgreSQL often uses 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gvip} -d ${POSTGRES_DB:-gvip}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gvip-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gvip-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://gvip:gvip_secret@postgres:5432/gvip
      DATABASE_URL_SYNC: postgresql://gvip:gvip_secret@postgres:5432/gvip
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      STORAGE_PATH: /app/storage/uploads
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ../storage:/app/storage
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gvip-celery
    environment:
      DATABASE_URL: postgresql+asyncpg://gvip:gvip_secret@postgres:5432/gvip
      DATABASE_URL_SYNC: postgresql://gvip:gvip_secret@postgres:5432/gvip
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_PATH: /app/storage/uploads
    volumes:
      - ../storage:/app/storage
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_worker.celery_app worker --loglevel=info

volumes:
  postgres_data:
